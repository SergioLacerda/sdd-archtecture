# LITE Constitution Template
# Copy this file to .ai/constitution.yaml and customize for your project
#
# Version: 2.1-lite
# Time to customize: 10 minutes
# For questions: See LITE-ADOPTION.md

project_name: "[YOUR_PROJECT_NAME]"
domain: "[YOUR_DOMAIN]"
team_size: "< 5 people"

# ============================================================================
# CORE PRINCIPLES (5 required for SDD framework)
# ============================================================================

principles:
  
  # Principle 1: Clean Architecture
  clean_architecture:
    description: "Business logic isolated from framework and infrastructure"
    rationale: "Enables testing without dependencies, easy framework swaps, long-term maintainability"
    
    your_implementation:
      layers: 4-6  # You decide: simplified from FULL's 8-layer
      example: |
        src/
        ├── domain/
        │   ├── entities.py (business logic, zero framework imports)
        │   └── services.py (use cases)
        ├── adapters/
        │   ├── http.py (REST API endpoints)
        │   └── database.py (persistence)
        └── tests/
            ├── test_domain.py (business logic tests)
            └── test_api.py (integration tests)
      
      enforcement: "grep -r 'import fastapi' src/domain/ && exit 1"  # No framework in domain
  
  # Principle 2: Async-First
  async_first:
    description: "All I/O operations are asynchronous"
    rationale: "Handles multiple concurrent operations efficiently, prevents blocking bottlenecks"
    
    your_implementation:
      required_async:
        - Database queries
        - External API calls
        - File I/O operations
      
      no_blocking:
        - Use async library equivalents
        - Never: time.sleep() → Use: await asyncio.sleep()
        - Never: requests.get() → Use: aiohttp.get()
      
      example: |
        # ✅ GOOD
        async def fetch_user(user_id: int):
            return await db.users.find_one({"id": user_id})
        
        # ❌ BAD
        def fetch_user(user_id: int):
            return db.users.find_one({"id": user_id})  # BLOCKING
  
  # Principle 3: Explicit Rules
  explicit_rules:
    description: "Document your architectural choices"
    rationale: "Everyone knows what's allowed, no ambiguous 'best practices'"
    
    your_implementation:
      must_have:
        - Architecture ADR (why you chose this structure)
        - Coding standards (style guide)
        - Import rules (what imports are allowed where)
      
      example: |
        # .ai/rules.md or ARCHITECTURE.md
        ## Import Rules
        - ✅ Allowed: from domain.entities import User
        - ✅ Allowed: from adapters.database import UserRepository
        - ❌ Forbidden: framework imports in domain/
        - ❌ Forbidden: cyclic imports
  
  # Principle 4: Test Pyramid
  test_pyramid:
    description: "Write tests at appropriate levels"
    rationale: "Fast feedback loop (unit), integration confidence (integration), end-to-end validation (e2e)"
    
    your_implementation:
      ratio: "70% unit : 20% integration : 10% e2e"
      
      unit_tests:
        - Test domain logic in isolation
        - No external dependencies
        - Run in < 1 second
        - Example: "test_user_validation.py"
      
      integration_tests:
        - Test API + database interaction
        - Use test database
        - Run in < 10 seconds
        - Example: "test_api_endpoints.py"
      
      e2e_tests:
        - Test full workflow
        - Use test environment
        - Run in < 60 seconds
        - Example: "test_user_registration_flow.py"
  
  # Principle 5: Progressive Disclosure
  progressive_disclosure:
    description: "Start minimal, grow complexity as needed"
    rationale: "Reduces cognitive load early, supports scaling from solo dev to team"
    
    your_implementation:
      week_1:
        - Domain logic only (no framework)
        - Unit tests for domain
        - Async patterns
      
      week_2_plus:
        - Add HTTP adapter
        - Add database adapter
        - Add integration tests
      
      later:
        - Advanced: Event streams, background jobs, caching
        - Scale: Pre-commit hooks, CI/CD validation, metrics

# ============================================================================
# ESSENTIAL RULES (3 required for SDD framework)
# ============================================================================

rules:
  - name: "No framework imports in domain layer"
    description: "Domain layer must never know about HTTP, database, or other adapters"
    enforcement: "Code review + grep validation"
    how_to_check: "grep -r 'import fastapi\\|import sqlalchemy' src/domain/"
  
  - name: "All I/O is async"
    description: "Every function that does I/O (database, HTTP, files) must be async"
    enforcement: "Code review + linting"
    how_to_check: "pytest tests/ && check for blocking calls"
  
  - name: "Every feature has a test"
    description: "Before committing, verify at least one test covers your feature"
    enforcement: "Code review + pytest coverage"
    how_to_check: "pytest tests/ --cov=src && check coverage"

# ============================================================================
# DEFINITION OF DONE (5 checkpoints)
# ============================================================================

definition_of_done:
  - name: "Code written"
    check: "Feature implemented in domain/ or adapters/"
  
  - name: "Tests passing"
    check: "pytest tests/ succeeds"
  
  - name: "Types valid"
    check: "mypy src/ succeeds (if using type hints)"
  
  - name: "No blocking I/O"
    check: "All I/O functions are async"
  
  - name: "No framework in domain"
    check: "grep -r 'import fastapi' src/domain/ returns nothing"

