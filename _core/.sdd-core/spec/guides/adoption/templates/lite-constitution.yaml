# ============================================================================
# UPGRADE PATH (when you're ready for LITE/FULL)
# ============================================================================

upgrade_notes: |
  This ULTRA-LITE constitution will serve you well for:
  - Solo dev projects (< 6 months)
  - Learning SDD patterns
  - MVP/prototype validation
  
  When you're ready to upgrade:
  1. All code written in ULTRA-LITE stays valid
  2. Just add more structure (pre-commit hooks, etc.)
  3. See LITE-ADOPTION.md for next steps
  
  Time to upgrade: ~10 minutes (copy new rules, run new tests)

