version: 1.0

architecture:
  ports:
    required: true
    forbid_direct_adapter_access: true
  layering:
    forbid_infra_in_domain: true
    forbid_frameworks_in_application: true

async:
  required: true
  forbid_blocking_io: true

testing:
  unit:
    forbid_real_infra: true
    forbid_network_calls: true
  integration:
    allow_real_adapters: true

spec_integrity:
  require_test_cases: true
  require_separation_is_should: true

context:
  max_tokens: 6000
  require_pruning: true